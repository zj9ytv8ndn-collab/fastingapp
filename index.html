<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0B3D2E">
<title>Dino Kids Academy — Learn & Play</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none; }
  html,body { height:100%; overflow:hidden; }
  body {
    font-family: -apple-system, 'Comic Sans MS', 'Chalkboard SE', 'Segoe UI', sans-serif;
    background: linear-gradient(165deg, #0B3D2E 0%, #14532D 35%, #166534 65%, #15803D 100%);
    display:flex; flex-direction:column; position:relative;
  }
  /* jungle decorations */
  .deco { position:fixed; z-index:0; opacity:.5; pointer-events:none; animation: bob 4s ease-in-out infinite alternate; filter: drop-shadow(0 4px 8px rgba(0,0,0,.3)); }
  @keyframes bob { from{ transform: translateY(0) rotate(-4deg);} to{ transform: translateY(-14px) rotate(4deg);} }
  header, main { position:relative; z-index:1; }
  /* ===== Header ===== */
  header {
    display:flex; align-items:center; justify-content:space-between;
    padding: calc(env(safe-area-inset-top, 0px) + 10px) 16px 10px; color:#fff;
  }
  .brand { display:flex; align-items:center; gap:10px; }
  .brand .mascot { font-size: clamp(30px,5vw,42px); animation: bob 3s ease-in-out infinite alternate; }
  header h1 { font-size: clamp(17px,3vw,25px); text-shadow: 0 2px 6px rgba(0,0,0,.4); letter-spacing:.5px; }
  #basketBtn {
    background: rgba(255,255,255,.18); border:2px solid rgba(255,255,255,.35); border-radius: 30px;
    padding: 8px 16px; font-size: clamp(16px,2.5vw,20px); color:#fff; cursor:pointer;
    display:flex; align-items:center; gap:8px;
  }
  #basketBtn:active { transform: scale(.94); }
  /* ===== Screens ===== */
  main { flex:1; position:relative; overflow:hidden; }
  .screen {
    position:absolute; inset:0; display:none; flex-direction:column;
    align-items:center; justify-content:center; padding: 12px; gap: 14px;
    animation: fadeIn .35s ease; overflow-y:auto;
  }
  .screen.active { display:flex; }
  @keyframes fadeIn { from{opacity:0; transform:translateY(14px);} to{opacity:1; transform:none;} }
  /* ===== Menu cards ===== */
  .menu-grid {
    display:grid; grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
    gap: 16px; width:100%; max-width: 900px; margin:auto;
  }
  .menu-card {
    border:none; border-radius: 28px; padding: 26px 16px; cursor:pointer;
    color:#fff; display:flex; flex-direction:column; align-items:center; gap:8px;
    box-shadow: 0 10px 24px rgba(0,0,0,.35), inset 0 2px 0 rgba(255,255,255,.3);
    transition: transform .15s; border: 3px solid rgba(255,255,255,.25);
  }
  .menu-card:active { transform: scale(.95); }
  .menu-card .emoji { font-size: clamp(44px, 7.5vw, 70px); }
  .menu-card .label { font-size: clamp(19px, 3.2vw, 26px); font-weight:800; }
  .menu-card .sub { font-size: clamp(12px, 1.9vw, 15px); opacity:.92; }
  .c-numbers { background: linear-gradient(160deg,#f97316,#ea580c); }
  .c-letters { background: linear-gradient(160deg,#0ea5e9,#2563eb); }
  .c-fruits  { background: linear-gradient(160deg,#ec4899,#be185d); }
  .c-animals { background: linear-gradient(160deg,#84cc16,#4d7c0f); }
  .c-iq      { background: linear-gradient(160deg,#a855f7,#7e22ce); }
  .c-land    { background: linear-gradient(160deg,#d97706,#92400e); }
  .c-sea     { background: linear-gradient(160deg,#06b6d4,#1d4ed8); }
  .c-sky     { background: linear-gradient(160deg,#38bdf8,#818cf8); }
  .c-pattern { background: linear-gradient(160deg,#f472b6,#db2777); }
  .c-odd     { background: linear-gradient(160deg,#fb923c,#c2410c); }
  .c-count   { background: linear-gradient(160deg,#34d399,#047857); }
  .c-color   { background: linear-gradient(160deg,#f43f5e,#9333ea); }
  .c-kinder  { background: linear-gradient(160deg,#fbbf24,#d97706); }
  .c-greet   { background: linear-gradient(160deg,#fbbf24,#f59e0b); }
  .c-bath    { background: linear-gradient(160deg,#22d3ee,#0891b2); }
  .c-polite  { background: linear-gradient(160deg,#f472b6,#db2777); }
  .c-school  { background: linear-gradient(160deg,#a3e635,#65a30d); }
  .c-feel    { background: linear-gradient(160deg,#c084fc,#7c3aed); }
  /* ===== Coloring ===== */
  .color-wrap { display:flex; flex-direction:column; align-items:center; gap:10px; width:100%; max-width:700px; }
  .color-title { color:#FDE047; font-size: clamp(18px,3.2vw,26px); font-weight:900; text-shadow:0 2px 8px rgba(0,0,0,.5); display:flex; align-items:center; gap:12px; }
  .color-title button { border:none; background:rgba(255,255,255,.2); color:#fff; border-radius:50%; width:44px; height:44px; font-size:20px; cursor:pointer; }
  .canvas-box {
    position:relative; width:min(92vw,560px); aspect-ratio:1/1; background:#fff;
    border-radius:26px; box-shadow:0 14px 34px rgba(0,0,0,.4), 0 0 0 6px rgba(253,224,71,.5);
    overflow:hidden; touch-action:none;
  }
  .canvas-box canvas { position:absolute; inset:0; width:100%; height:100%; }
  #paintCanvas { cursor:crosshair; }
  .toolbar { display:flex; flex-wrap:wrap; align-items:center; justify-content:center; gap:8px; width:min(94vw,620px); }
  .swatch {
    width: clamp(38px,7vw,50px); height: clamp(38px,7vw,50px); border-radius:50%;
    border:3px solid rgba(255,255,255,.7); cursor:pointer; box-shadow:0 3px 8px rgba(0,0,0,.3);
  }
  .swatch.on { outline:4px solid #FDE047; transform:scale(1.15); }
  .tool-btn {
    border:none; border-radius:16px; padding:8px 14px; cursor:pointer;
    font-size: clamp(16px,2.8vw,21px); font-weight:800; color:#14532D; background:rgba(255,255,255,.9);
    box-shadow:0 4px 10px rgba(0,0,0,.3); display:flex; align-items:center; gap:6px;
  }
  .tool-btn.on { background:#FDE047; transform:scale(1.06); }
  .tool-btn:active { transform:scale(.94); }
  /* ===== Top bar ===== */
  .topbar { display:flex; align-items:center; gap:12px; width:100%; max-width:900px; }
  .btn-back {
    background: rgba(255,255,255,.2); border:2px solid rgba(255,255,255,.3); color:#fff; border-radius:16px;
    font-size: clamp(17px,2.8vw,22px); padding:7px 15px; cursor:pointer;
  }
  .mode-switch { display:flex; gap:8px; margin-left:auto; }
  .mode-btn {
    border:none; border-radius:16px; padding:8px 18px; cursor:pointer;
    font-size: clamp(14px,2.3vw,18px); font-weight:700; color:#14532D; background:rgba(255,255,255,.65);
  }
  .mode-btn.on { background:#FDE047; box-shadow:0 4px 12px rgba(0,0,0,.3); transform:scale(1.06); }
  /* ===== Learn card ===== */
  .learn-card {
    background: linear-gradient(180deg,#FFFDF5,#FFF7E0); border-radius:32px; width:min(88vw, 460px);
    padding: 26px 18px; display:flex; flex-direction:column; align-items:center; gap:8px;
    box-shadow: 0 16px 40px rgba(0,0,0,.4), 0 0 0 6px rgba(253,224,71,.5); cursor:pointer;
    animation: pop .3s ease;
  }
  @keyframes pop { 0%{transform:scale(.85);} 60%{transform:scale(1.04);} 100%{transform:scale(1);} }
  .learn-card .big {
    font-size: clamp(84px, 20vw, 160px); font-weight:900; line-height:1.05;
    background: linear-gradient(160deg,#16A34A,#F59E0B);
    -webkit-background-clip:text; background-clip:text; color:transparent; text-align:center;
  }
  .learn-card .word { font-size: clamp(21px,3.8vw,30px); color:#3f3f46; font-weight:800; text-align:center; }
  .learn-card .hint { font-size: clamp(14px,2.3vw,18px); color:#a1a1aa; }
  .learn-card .femoji { font-size: clamp(76px,17vw,130px); }
  .nav-row { display:flex; gap:14px; align-items:center; }
  .nav-btn {
    border:none; border-radius:50%; width: clamp(52px,8.5vw,66px); height: clamp(52px,8.5vw,66px);
    font-size: clamp(20px,3.6vw,28px); background:#FDE047; color:#14532D; cursor:pointer;
    box-shadow:0 6px 16px rgba(0,0,0,.35);
  }
  .nav-btn:active { transform:scale(.9); }
  .counter { color:#fff; font-size: clamp(15px,2.5vw,19px); font-weight:700; text-shadow:0 1px 4px rgba(0,0,0,.4); }
  /* ===== Quiz ===== */
  .quiz-q {
    background:rgba(255,255,255,.95); border-radius:24px; padding:13px 22px;
    font-size: clamp(18px,3.4vw,28px); font-weight:800; color:#1f2937;
    display:flex; align-items:center; gap:12px; box-shadow:0 8px 20px rgba(0,0,0,.3);
    max-width:min(94vw,700px); text-align:center;
  }
  .quiz-q button { border:none; background:#16A34A; color:#fff; border-radius:50%; width:44px; height:44px; font-size:20px; cursor:pointer; flex:none; }
  #quizStage {
    display:none; background:rgba(255,255,255,.14); border:3px dashed rgba(255,255,255,.45);
    border-radius:24px; padding:14px 22px; max-width:min(94vw,700px);
    font-size: clamp(34px,7vw,58px); letter-spacing:6px; text-align:center; line-height:1.4;
  }
  #quizStage.show { display:block; animation: pop .3s ease; }
  .options { display:grid; grid-template-columns:1fr 1fr; gap:14px; width:min(92vw,560px); }
  .opt {
    border:none; border-radius:26px; padding: clamp(16px,3.8vw,30px); cursor:pointer;
    font-size: clamp(32px,6.5vw,54px); font-weight:900; color:#fff;
    box-shadow:0 8px 18px rgba(0,0,0,.35), inset 0 2px 0 rgba(255,255,255,.3);
    transition: transform .12s; border:3px solid rgba(255,255,255,.25);
  }
  .opt:active { transform:scale(.94); }
  .opt.o0{ background:linear-gradient(160deg,#f97316,#c2410c);}
  .opt.o1{ background:linear-gradient(160deg,#0ea5e9,#1d4ed8);}
  .opt.o2{ background:linear-gradient(160deg,#22c55e,#15803d);}
  .opt.o3{ background:linear-gradient(160deg,#e879f9,#a21caf);}
  .opt.wrong { animation: shake .4s; opacity:.5; pointer-events:none; }
  @keyframes shake { 0%,100%{transform:translateX(0);} 25%{transform:translateX(-10px);} 75%{transform:translateX(10px);} }
  .score { color:#fff; font-size: clamp(15px,2.6vw,20px); font-weight:800; text-shadow:0 1px 4px rgba(0,0,0,.4); }
  /* ===== Reward overlay ===== */
  #reward {
    position:fixed; inset:0; background:rgba(10,30,20,.85); z-index:50;
    display:none; flex-direction:column; align-items:center; justify-content:center; gap:12px;
  }
  #reward.show { display:flex; }
  #rewardDino { font-size: clamp(56px,12vw,90px); animation: bob .6s infinite alternate; }
  #rewardFruit { font-size: clamp(110px, 27vw, 200px); animation: bounce .8s infinite alternate; filter: drop-shadow(0 12px 24px rgba(0,0,0,.5)); }
  @keyframes bounce { from{transform:translateY(0) scale(1);} to{transform:translateY(-24px) scale(1.08);} }
  #rewardText { color:#FDE047; font-size: clamp(24px,4.8vw,40px); font-weight:900; text-shadow:0 3px 10px rgba(0,0,0,.5); }
  #rewardFruitName { color:#fff; font-size: clamp(20px,3.8vw,32px); font-weight:800; }
  #rewardTap { color:rgba(255,255,255,.75); font-size: clamp(14px,2.3vw,18px); margin-top:16px; animation: blink 1.2s infinite; }
  @keyframes blink { 50%{opacity:.3;} }
  .confetti { position:fixed; top:-20px; z-index:49; font-size:26px; animation: fall linear forwards; pointer-events:none; }
  @keyframes fall { to{ transform: translateY(110vh) rotate(720deg); opacity:.7; } }
  /* ===== Basket ===== */
  .basket-grid {
    display:grid; grid-template-columns: repeat(auto-fill, minmax(105px,1fr));
    gap:12px; width:min(92vw,760px); max-height: 60vh; overflow-y:auto; padding:6px;
  }
  .b-item {
    background:rgba(255,255,255,.95); border-radius:20px; padding:13px 8px;
    display:flex; flex-direction:column; align-items:center; gap:4px; cursor:pointer;
    border:3px solid rgba(253,224,71,.6);
  }
  .b-item .e{ font-size:42px; } .b-item .n{ font-size:14px; font-weight:800; color:#3f3f46; }
  .b-item .c{ font-size:12px; color:#71717a; }
  .empty { color:#fff; font-size:19px; text-align:center; text-shadow:0 1px 4px rgba(0,0,0,.4); }
  .screen-title {
    color:#FDE047; font-size: clamp(20px,3.6vw,30px); font-weight:900;
    text-shadow:0 2px 8px rgba(0,0,0,.5);
  }
</style>
</head>
<body>
<span class="deco" style="top:12%; left:3%; font-size:52px;">🌿</span>
<span class="deco" style="top:65%; left:2%; font-size:44px; animation-delay:.8s;">🌴</span>
<span class="deco" style="top:20%; right:4%; font-size:48px; animation-delay:.4s;">🦕</span>
<span class="deco" style="top:72%; right:3%; font-size:40px; animation-delay:1.2s;">🌿</span>
<span class="deco" style="top:45%; left:1%; font-size:36px; animation-delay:1.6s;">🥚</span>
<span class="deco" style="top:50%; right:1.5%; font-size:38px; animation-delay:2s;">🌋</span>
<header>
  <div class="brand"><span class="mascot">🦖</span><h1>Dino Kids Academy</h1></div>
  <button id="basketBtn">🧺 <span id="basketCount">0</span></button>
</header>
<main>
  <!-- HOME -->
  <section id="scr-home" class="screen active">
    <div class="menu-grid">
      <button class="menu-card c-numbers" onclick="openLearn('numbers')">
        <span class="emoji">🔢</span><span class="label">Numbers</span><span class="sub">Count 1 to 100</span>
      </button>
      <button class="menu-card c-letters" onclick="openLearn('letters')">
        <span class="emoji">🔤</span><span class="label">ABC Letters</span><span class="sub">Learn A to Z</span>
      </button>
      <button class="menu-card c-fruits" onclick="openLearn('fruits')">
        <span class="emoji">🍎</span><span class="label">Fruits</span><span class="sub">19 yummy fruits</span>
      </button>
      <button class="menu-card c-animals" onclick="openAnimalsMenu()">
        <span class="emoji">🦁</span><span class="label">Animals</span><span class="sub">Land • Sea • Sky</span>
      </button>
      <button class="menu-card c-iq" onclick="openIQMenu()">
        <span class="emoji">🧠</span><span class="label">IQ Games</span><span class="sub">Smart dino challenges</span>
      </button>
      <button class="menu-card c-color" onclick="openColoring()">
        <span class="emoji">🎨</span><span class="label">Coloring</span><span class="sub">Paint the animals!</span>
      </button>
      <button class="menu-card c-kinder" onclick="openKinderMenu()">
        <span class="emoji">🏫</span><span class="label">Kind Words</span><span class="sub">Ready for kindergarten!</span>
      </button>
    </div>
  </section>

  <!-- KINDERGARTEN SUB-MENU -->
  <section id="scr-kinder" class="screen">
    <div class="topbar"><button class="btn-back" onclick="goHome()">⬅️</button></div>
    <div class="screen-title">🏫 Magic words for school!</div>
    <div class="menu-grid">
      <button class="menu-card c-greet" onclick="openLearn('k-greet')">
        <span class="emoji">👋</span><span class="label">Hello & Goodbye</span><span class="sub">Good morning, teacher!</span>
      </button>
      <button class="menu-card c-bath" onclick="openLearn('k-bath')">
        <span class="emoji">🚽</span><span class="label">Bathroom & Water</span><span class="sub">May I go, please?</span>
      </button>
      <button class="menu-card c-polite" onclick="openLearn('k-polite')">
        <span class="emoji">🙏</span><span class="label">Polite Words</span><span class="sub">Please & Thank you</span>
      </button>
      <button class="menu-card c-school" onclick="openLearn('k-school')">
        <span class="emoji">🎒</span><span class="label">At School</span><span class="sub">Line up, clean up!</span>
      </button>
      <button class="menu-card c-feel" onclick="openLearn('k-feel')">
        <span class="emoji">😊</span><span class="label">My Feelings</span><span class="sub">I'm hungry, I'm tired…</span>
      </button>
    </div>
  </section>

  <!-- ANIMALS SUB-MENU -->
  <section id="scr-animals" class="screen">
    <div class="topbar"><button class="btn-back" onclick="goHome()">⬅️</button></div>
    <div class="screen-title">🦖 Where do they live?</div>
    <div class="menu-grid">
      <button class="menu-card c-land" onclick="openLearn('land')">
        <span class="emoji">🦁</span><span class="label">Land Animals</span><span class="sub">Lion, Panda, Elephant…</span>
      </button>
      <button class="menu-card c-sea" onclick="openLearn('sea')">
        <span class="emoji">🐬</span><span class="label">Sea Animals</span><span class="sub">Dolphin, Shark, Whale…</span>
      </button>
      <button class="menu-card c-sky" onclick="openLearn('sky')">
        <span class="emoji">🦅</span><span class="label">Sky Animals</span><span class="sub">Eagle, Owl, Butterfly…</span>
      </button>
    </div>
  </section>

  <!-- IQ SUB-MENU -->
  <section id="scr-iq" class="screen">
    <div class="topbar"><button class="btn-back" onclick="goHome()">⬅️</button></div>
    <div class="screen-title">🧠 Train your brain, little dino!</div>
    <div class="menu-grid">
      <button class="menu-card c-pattern" onclick="openIQ('pattern')">
        <span class="emoji">🧩</span><span class="label">What Comes Next?</span><span class="sub">Find the pattern</span>
      </button>
      <button class="menu-card c-odd" onclick="openIQ('odd')">
        <span class="emoji">🔍</span><span class="label">Odd One Out</span><span class="sub">Which one is different?</span>
      </button>
      <button class="menu-card c-count" onclick="openIQ('count')">
        <span class="emoji">🧮</span><span class="label">How Many?</span><span class="sub">Count the objects</span>
      </button>
    </div>
  </section>

  <!-- LEARN -->
  <section id="scr-learn" class="screen">
    <div class="topbar">
      <button class="btn-back" onclick="goBack()">⬅️</button>
      <div class="mode-switch">
        <button class="mode-btn on" id="mLearn" onclick="setMode('learn')">📖 Learn</button>
        <button class="mode-btn" id="mQuiz" onclick="setMode('quiz')">🎯 Quiz</button>
      </div>
    </div>
    <div class="learn-card" id="learnCard" onclick="speakCurrent()">
      <div id="learnVisual" class="big">1</div>
      <div id="learnWord" class="word">One</div>
      <div class="hint">👆 Tap to hear it!</div>
    </div>
    <div class="nav-row">
      <button class="nav-btn" onclick="nav(-1)">◀️</button>
      <span class="counter" id="learnCounter">1 / 100</span>
      <button class="nav-btn" onclick="nav(1)">▶️</button>
    </div>
  </section>

  <!-- QUIZ -->
  <section id="scr-quiz" class="screen">
    <div class="topbar">
      <button class="btn-back" onclick="goBack()">⬅️</button>
      <div class="mode-switch" id="modeSwitchQuiz">
        <button class="mode-btn" id="mLearn2" onclick="setMode('learn')">📖 Learn</button>
        <button class="mode-btn on" id="mQuiz2" onclick="setMode('quiz')">🎯 Quiz</button>
      </div>
    </div>
    <div class="quiz-q"><span id="quizText">Find the number 5</span><button onclick="speakQuestion()">🔊</button></div>
    <div id="quizStage"></div>
    <div class="options" id="options"></div>
    <div class="score" id="scoreLine">🦖 Level 1 &nbsp;|&nbsp; ⭐ 0 &nbsp;|&nbsp; 🧺 0</div>
  </section>

  <!-- COLORING -->
  <section id="scr-color" class="screen">
    <div class="topbar"><button class="btn-back" onclick="goHome()">⬅️</button></div>
    <div class="color-wrap">
      <div class="color-title">
        <button onclick="colorNav(-1)">◀️</button>
        <span id="colorName">Color the Lion!</span>
        <button onclick="colorNav(1)">▶️</button>
      </div>
      <div class="canvas-box">
        <canvas id="templateCanvas" width="800" height="800"></canvas>
        <canvas id="paintCanvas" width="800" height="800"></canvas>
      </div>
      <div class="toolbar" id="palette"></div>
      <div class="toolbar">
        <button class="tool-btn" id="btnBrushS" onclick="setBrush(10,this)">🖌️ Small</button>
        <button class="tool-btn on" id="btnBrushM" onclick="setBrush(24,this)">🖌️ Big</button>
        <button class="tool-btn" id="btnEraser" onclick="toggleEraser()">🧽 Eraser</button>
        <button class="tool-btn" onclick="clearPaint(true)">🗑️ Clear</button>
        <button class="tool-btn" style="background:#FDE047" onclick="finishColoring()">✅ Done!</button>
      </div>
    </div>
  </section>

  <!-- BASKET -->
  <section id="scr-basket" class="screen">
    <div class="topbar"><button class="btn-back" onclick="goHome()">⬅️</button></div>
    <div class="quiz-q">🧺 My Fruit Basket</div>
    <div class="basket-grid" id="basketGrid"></div>
  </section>
</main>

<script>
/* ================= DATA (English-checked) ================= */
const ONES=["","One","Two","Three","Four","Five","Six","Seven","Eight","Nine","Ten","Eleven","Twelve","Thirteen","Fourteen","Fifteen","Sixteen","Seventeen","Eighteen","Nineteen"];
const TENS=["","","Twenty","Thirty","Forty","Fifty","Sixty","Seventy","Eighty","Ninety"];
function numWord(n){ if(n<20)return ONES[n]; if(n<100){const t=Math.floor(n/10),o=n%10;return TENS[t]+(o?"-"+ONES[o]:"");} return "One Hundred"; }
function art(w){ return /^[aeiou]/i.test(w) ? "an" : "a"; }
function plural(w){ return /(s|x|ch|sh)$/i.test(w) ? w+"es" : w+"s"; }

let voice=null;
function pickVoice(){
  const vs=speechSynthesis.getVoices().filter(v=>v.lang && v.lang.toLowerCase().startsWith("en"));
  voice = vs.find(v=>v.lang==="en-US" && /alex|aaron|fred|guy|david|mark|james|george|eddy|reed|rocko|rishi/i.test(v.name))
       || vs.find(v=>/alex|aaron|fred|daniel|arthur|gordon|guy/i.test(v.name))
       || vs.find(v=>v.lang==="en-US") || vs[0] || null;
}
speechSynthesis.onvoiceschanged=pickVoice; pickVoice();
function speak(text, rate){
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  if(voice) u.voice=voice;
  u.lang="en-US"; u.rate=rate||0.95; u.pitch=1.0;
  speechSynthesis.speak(u);
}
/* happy / oops tones */
let AC=null;
function tone(freq,dur,type,when){
  try{
    AC=AC||new (window.AudioContext||window.webkitAudioContext)();
    const o=AC.createOscillator(), g=AC.createGain();
    o.type=type||"sine"; o.frequency.value=freq;
    g.gain.setValueAtTime(0.001,AC.currentTime+when);
    g.gain.exponentialRampToValueAtTime(0.25,AC.currentTime+when+0.03);
    g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+when+dur);
    o.connect(g); g.connect(AC.destination);
    o.start(AC.currentTime+when); o.stop(AC.currentTime+when+dur+0.05);
  }catch(e){}
}
const sfxGood=()=>{tone(523,.18,"sine",0);tone(659,.18,"sine",.12);tone(784,.3,"sine",.24);};
const sfxBad =()=>{tone(220,.25,"triangle",0);tone(180,.3,"triangle",.15);};

function items(){
  if(subject==="numbers") return Array.from({length:100},(_,i)=>({big:String(i+1),word:numWord(i+1),say:numWord(i+1)}));
  if(subject==="letters") return LETTERS.map(l=>({big:l+" "+l.toLowerCase(),word:LETTER_WORDS[l],say:l+". "+l+" is for "+LETTER_WORDS[l].replace(/[^a-zA-Z \-]/g,"").trim()}));
  if(ANIMALS[subject]) return ANIMALS[subject].map(a=>({big:a.e,word:a.n,say:a.n+". The "+a.n+" "+HABITAT_SAY[subject]+". The "+a.n+" "+a.s+"!",fruit:true}));
  if(KINDER[subject]) return KINDER[subject].map(p=>({big:p.e,word:p.t,say:p.t+" ... One more time! ... "+p.t,fruit:true,phrase:true}));
  return FRUITS.map(f=>({big:f.e,word:f.n,say:f.n+". This is "+art(f.n)+" "+f.n+". Yummy yummy!",fruit:true}));
}

/* ================= QUIZ (fixed logic) ================= */
function shuffle(a){ for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }
function pickDistinct(pool,n,exclude){
  const s=new Set(exclude?[exclude]:[]);
  while(s.size<n) s.add(pool[Math.floor(Math.random()*pool.length)]);
  return [...s];
}
function newQuestion(){
  let q={stage:null};
  if(subject==="numbers"){
    const ans=1+Math.floor(Math.random()*100);
    const set=new Set([ans]);
    while(set.size<4){ let d=ans+Math.floor(Math.random()*21)-10; if(d>=1&&d<=100) set.add(d); }
    while(set.size<4) set.add(1+Math.floor(Math.random()*100));
    const opts=shuffle([...set].map(String));
    q={prompt:"Find the number "+ans, say:"Can you find the number "+numWord(ans)+"?", answer:String(ans), opts, emoji:false};
  }
  else if(subject==="letters"){
    const ans=LETTERS[Math.floor(Math.random()*26)];
    const set=new Set([ans]);
    while(set.size<4) set.add(LETTERS[Math.floor(Math.random()*26)]);
    q={prompt:"Find the letter "+ans, say:"Where is the letter "+ans+"?", answer:ans, opts:shuffle([...set]), emoji:false};
  }
  else if(subject==="fruits" || ANIMALS[subject]){
    const isFruit=subject==="fruits";
    const pool=isFruit?FRUITS:ANIMALS[subject];
    const four=shuffle(pickDistinct(pool,4));
    const ans=four[0];
    const sayQ=isFruit
      ? "Yum yum! Can you find the "+ans.n+"?"
      : "Can you find the "+ans.n+"? The "+ans.n+" "+HABITAT_SAY[subject]+"!";
    q={prompt:"Find the "+ans.n+"!", say:sayQ, answer:ans.e, opts:four.map(x=>x.e), emoji:true};
  }
  else if(KINDER[subject]){
    const pool=KINDER[subject];
    const four=shuffle(pickDistinct(pool,4));
    const ans=four[0];
    q={prompt:ans.e+" "+ans.sit, say:ans.sit, answer:ans.t, opts:four.map(x=>x.t), emoji:false, small:true, tip:ans.tip};
  }
  else if(subject==="iq-pattern"){
    const type=shuffle(["AB","AAB","ABC"])[0];
    const em=shuffle(EMOJI_POOL).slice(0,type==="ABC"?3:2);
    let seq=[];
    if(type==="AB") seq=[em[0],em[1],em[0],em[1],em[0]];
    else if(type==="AAB") seq=[em[0],em[0],em[1],em[0],em[0]];
    else seq=[em[0],em[1],em[2],em[0],em[1]];
    const ans=type==="AB"?em[1]:(type==="AAB"?em[1]:em[2]);
    const optsSet=new Set([ans,...em]);
    while(optsSet.size<4) optsSet.add(EMOJI_POOL[Math.floor(Math.random()*EMOJI_POOL.length)]);
    q={prompt:"What comes next? 🧩", say:"Look at the pattern! What comes next?", stage:seq.join(" ")+" ❓", answer:ans, opts:shuffle([...optsSet]), emoji:true};
  }
  else if(subject==="iq-odd"){
    const two=shuffle(EMOJI_POOL).slice(0,2);
    q={prompt:"Which one is different? 🔍", say:"Three are the same. Tap the one that is different!",
       stage:two[0]+" "+two[0]+" "+two[1]+" "+two[0], answer:two[1], opts:shuffle([two[0],two[0],two[0],two[1]]), emoji:true};
  }
  else if(subject==="iq-count"){
    const f=FRUITS[Math.floor(Math.random()*FRUITS.length)];
    const n=2+Math.floor(Math.random()*8); // 2..9
    const set=new Set([n]);
    while(set.size<4){ let d=n+Math.floor(Math.random()*5)-2; if(d>=1&&d<=10) set.add(d); }
    while(set.size<4) set.add(1+Math.floor(Math.random()*10));
    q={prompt:"How many "+plural(f.n.toLowerCase())+"? 🧮", say:"Count with me! How many "+plural(f.n.toLowerCase())+" do you see?",
       stage:Array(n).fill(f.e).join(" "), answer:String(n), opts:shuffle([...set].map(String)), emoji:false};
  }
  quiz=q;
  document.getElementById("quizText").textContent=q.prompt;
  const stage=document.getElementById("quizStage");
  if(q.stage){ stage.textContent=q.stage; stage.classList.add("show"); } else stage.classList.remove("show");
  const box=document.getElementById("options"); box.innerHTML="";
  q.opts.forEach((o,i)=>{
    const b=document.createElement("button");
    b.className="opt o"+i;
    b.textContent=o;
    if(q.emoji) b.style.fontSize="clamp(42px,9.5vw,80px)";
    if(q.small){ b.style.fontSize="clamp(15px,2.8vw,22px)"; b.style.padding="clamp(20px,4vw,30px)"; b.style.lineHeight="1.35"; }
    b.onclick=()=>answer(b,o);
    box.appendChild(b);
  });
  updateScore();
  setTimeout(()=>speak(q.say),300);
}
function speakQuestion(){ if(quiz) speak(quiz.say); }
function updateScore(){
  const total=Object.values(basket).reduce((a,b)=>a+b,0);
  const level=Math.floor(score/5)+1;
  document.getElementById("scoreLine").innerHTML="🦖 Level "+level+" &nbsp;|&nbsp; ⭐ "+score+" &nbsp;|&nbsp; 🧺 "+total;
  document.getElementById("basketCount").textContent=total;
}
function answer(btn,opt){
  if(!quiz) return;
  if(opt===quiz.answer){
    const oldLevel=Math.floor(score/5);
    score++; localStorage.setItem("kidsScore",score);
    const newLevel=Math.floor(score/5);
    const fruit=FRUITS[Math.floor(Math.random()*FRUITS.length)];
    basket[fruit.n]=(basket[fruit.n]||0)+1;
    localStorage.setItem("kidsBasket",JSON.stringify(basket));
    sfxGood();
    showReward(fruit, newLevel>oldLevel);
  } else {
    btn.classList.add("wrong");
    sfxBad();
    speak(TRY_AGAIN[Math.floor(Math.random()*TRY_AGAIN.length)],1);
  }
}

function confetti(){
  const em=["🎉","⭐","🎊","✨","🌟","🦖","🦕","💚"];
  for(let i=0;i<26;i++){
    const s=document.createElement("span");
    s.className="confetti"; s.textContent=em[Math.floor(Math.random()*em.length)];
    s.style.left=Math.random()*100+"vw";
    s.style.animationDuration=(1.6+Math.random()*1.6)+"s";
    s.style.fontSize=(18+Math.random()*26)+"px";
    document.body.appendChild(s);
    setTimeout(()=>s.remove(),3400);
  }
}

 {n:"Long-neck Dino",e:"🦕"},{n:"Dolphin",e:"🐬"},{n:"Shark",e:"🦈"},{n:"Turtle",e:"🐢"},
 {n:"Penguin",e:"🐧"},{n:"Eagle",e:"🦅"},{n:"Butterfly",e:"🦋"},{n:"Owl",e:"🦉"},
 {n:"Apple",e:"🍎"},{n:"Strawberry",e:"🍓"},{n:"Pineapple",e:"🍍"},{n:"Watermelon",e:"🍉"}
];
const COLORS=[
 {n:"Red",c:"#EF4444"},{n:"Orange",c:"#F97316"},{n:"Yellow",c:"#FACC15"},
 {n:"Green",c:"#22C55E"},{n:"Blue",c:"#3B82F6"},{n:"Purple",c:"#A855F7"},
 {n:"Pink",c:"#EC4899"},{n:"Brown",c:"#92400E"},{n:"Black",c:"#1F2937"},{n:"White",c:"#FFFFFF"}
];
let cIdx=0, brushColor=COLORS[0], brushSize=24, erasing=false, painting=false, lastPt=null;
const tCanvas=()=>document.getElementById("templateCanvas");
const pCanvas=()=>document.getElementById("paintCanvas");

function openColoring(){
  show("color");
  buildPalette();
  loadColorPic();
}
function buildPalette(){
  const p=document.getElementById("palette");
  if(p.childElementCount) return;
  COLORS.forEach((col,i)=>{
    const b=document.createElement("button");
    b.className="swatch"+(i===0?" on":"");
    b.style.background=col.c;
    b.title=col.n;
    b.onclick=()=>{
      brushColor=col; erasing=false;
      document.querySelectorAll(".swatch").forEach(s=>s.classList.remove("on"));
      b.classList.add("on");
      document.getElementById("btnEraser").classList.remove("on");
      speak(col.n+"!");
    };
    p.appendChild(b);
  });
}
function loadColorPic(){
  const pic=COLOR_PICS[cIdx];
  document.getElementById("colorName").textContent="Color the "+pic.n+"!";
  const tc=tCanvas(), ctx=tc.getContext("2d");
  ctx.clearRect(0,0,tc.width,tc.height);
  ctx.fillStyle="#FFFFFF"; ctx.fillRect(0,0,tc.width,tc.height);
  ctx.globalAlpha=0.35;
  ctx.font="560px serif"; ctx.textAlign="center"; ctx.textBaseline="middle";
  ctx.fillText(pic.e, tc.width/2, tc.height/2+20);
  ctx.globalAlpha=1;
  clearPaint(false);
  speak("Color the "+pic.n+"! Pick a color, little artist!");
}
function colorNav(d){
  cIdx=(cIdx+d+COLOR_PICS.length)%COLOR_PICS.length;
  loadColorPic();
}
function setBrush(size,btn){
  brushSize=size; erasing=false;
  document.getElementById("btnBrushS").classList.toggle("on",size===10);
  document.getElementById("btnBrushM").classList.toggle("on",size===24);
  document.getElementById("btnEraser").classList.remove("on");
  speak(size===10?"Small brush!":"Big brush!");
}
function toggleEraser(){
  erasing=!erasing;
  document.getElementById("btnEraser").classList.toggle("on",erasing);
  if(erasing) speak("Eraser! Rub it away!");
}
function clearPaint(announce){
  const pc=pCanvas(), ctx=pc.getContext("2d");
  ctx.clearRect(0,0,pc.width,pc.height);
  if(announce) speak("All clean! Let's color again!");
}
function finishColoring(){
  sfxGood(); confetti();
  const pic=COLOR_PICS[cIdx];
  const p=PRAISE[Math.floor(Math.random()*PRAISE.length)];
  speak(p+" What a beautiful "+pic.n+"! You are a great artist!");
}
function canvasPos(e){
  const pc=pCanvas(), r=pc.getBoundingClientRect();
  return { x:(e.clientX-r.left)*(pc.width/r.width), y:(e.clientY-r.top)*(pc.height/r.height) };
}
function paintDot(pt){
  const pc=pCanvas(), ctx=pc.getContext("2d");
  ctx.globalCompositeOperation=erasing?"destination-out":"source-over";
  ctx.fillStyle=brushColor.c;
  ctx.beginPath(); ctx.arc(pt.x,pt.y,brushSize/2,0,Math.PI*2); ctx.fill();
  ctx.globalCompositeOperation="source-over";
}
function paintLine(a,b){
  const pc=pCanvas(), ctx=pc.getContext("2d");
  ctx.globalCompositeOperation=erasing?"destination-out":"source-over";
  ctx.strokeStyle=brushColor.c; ctx.lineWidth=brushSize; ctx.lineCap="round"; ctx.lineJoin="round";
  ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.stroke();
  ctx.globalCompositeOperation="source-over";
}
(function initPaint(){
  const bind=()=>{
    const pc=pCanvas(); if(!pc) return;
    pc.addEventListener("pointerdown",e=>{ e.preventDefault(); painting=true; lastPt=canvasPos(e); paintDot(lastPt); pc.setPointerCapture(e.pointerId); });
    pc.addEventListener("pointermove",e=>{ if(!painting) return; e.preventDefault(); const pt=canvasPos(e); paintLine(lastPt,pt); lastPt=pt; });
    const stop=()=>{ painting=false; lastPt=null; };
    pc.addEventListener("pointerup",stop);
    pc.addEventListener("pointercancel",stop);
  };
  document.readyState==="loading" ? document.addEventListener("DOMContentLoaded",bind) : bind();
})();

/* ================= BASKET ================= */
document.getElementById("basketBtn").onclick=()=>{
  const g=document.getElementById("basketGrid"); g.innerHTML="";
  const keys=Object.keys(basket);
  if(!keys.length){ g.innerHTML='<div class="empty" style="grid-column:1/-1">No fruits yet!<br>Play the quiz to win yummy fruits! 🍓</div>'; }
  keys.forEach(k=>{
    const f=FRUITS.find(x=>x.n===k)||{e:"🍇",n:k};
    const d=document.createElement("div"); d.className="b-item";
    d.innerHTML='<span class="e">'+f.e+'</span><span class="n">'+k+'</span><span class="c">x '+basket[k]+'</span>';
    d.onclick=()=>speak(k+"! You have "+basket[k]+" "+(basket[k]>1?plural(k.toLowerCase()):k.toLowerCase())+"!");
    g.appendChild(d);
  });
  show("basket");
  speak("Roar! Look at all your yummy fruits!");
};
